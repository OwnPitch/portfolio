<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Post – Anneli's Portfolio</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; }
    header { padding: 2rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    header a { text-decoration: none; color: inherit; font-weight: 600; }
    .post-container { max-width: 720px; margin: 4rem auto; padding: 0 2rem; }
    .post-meta { color: #999; font-size: 0.9rem; margin-bottom: 1rem; }
    .post-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 1rem; line-height: 1.2; }
    .post-desc { font-size: 1.15rem; color: #555; margin-bottom: 2rem; border-bottom: 1px solid #eee; padding-bottom: 2rem; }
    .post-body { line-height: 1.8; font-size: 1.05rem; }
    .post-body h2 { font-size: 1.5rem; margin: 2rem 0 0.5rem; }
    .post-body h3 { font-size: 1.2rem; margin: 1.5rem 0 0.5rem; }
    .post-body p { margin-bottom: 1rem; }
    .post-body ul, .post-body ol { margin: 1rem 0 1rem 1.5rem; }
    .post-body li { margin-bottom: 0.4rem; }
    .post-body code { background: #f5f5f5; padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; }
    .post-body pre { background: #f5f5f5; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1rem 0; }
    .back-link { display: inline-block; margin-top: 3rem; color: #0070f3; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <a href="/blog/">← All Posts</a>
    <a href="/">Portfolio</a>
  </header>
  <div class="post-container">
    <div id="post-content">
      <p style="color:#999;text-align:center;padding:3rem">Loading post...</p>
    </div>
  </div>
  <script>
    const REPO = 'OwnPitch/portfolio';
    const BRANCH = 'main';

    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      if (!slug) { document.getElementById('post-content').innerHTML = '<p>Post not found.</p>'; return; }
      try {
        const res = await fetch(`https://raw.githubusercontent.com/${REPO}/${BRANCH}/_posts/${slug}.md`);
        if (!res.ok) throw new Error('Not found');
        const text = await res.text();
        const frontmatterMatch = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
        const meta = {};
        let body = text;
        if (frontmatterMatch) {
          frontmatterMatch[1].split('\n').forEach(line => {
            const [key, ...val] = line.split(':');
            if (key) meta[key.trim()] = val.join(':').trim().replace(/^"|"$/g, '');
          });
          body = frontmatterMatch[2];
        }
        document.title = `${meta.title || 'Post'} – Anneli's Portfolio`;
        const date = meta.date ? new Date(meta.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
        document.getElementById('post-content').innerHTML = `
          <div class="post-meta">${date}</div>
          <h1 class="post-title">${meta.title || ''}</h1>
          ${meta.description ? `<p class="post-desc">${meta.description}</p>` : ''}
          <div class="post-body">${marked.parse(body)}</div>
          <a class="back-link" href="/blog/">← Back to all posts</a>
        `;
      } catch (e) {
        document.getElementById('post-content').innerHTML = '<p>Post not found.</p>';
      }
    }
    loadPost();
  </script>
</body>
</html>
